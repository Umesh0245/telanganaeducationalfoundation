<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">TEF Scholarship Flyer 2026</title>
  <desc id="desc">Merit scholarship support for 1000 students with assistance up to Rs 4,50,000 for eligible intermediate passing students.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5fcf6"/>
      <stop offset="100%" stop-color="#e1f3e8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f4c86"/>
      <stop offset="100%" stop-color="#1f8f5d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb13d"/>
      <stop offset="100%" stop-color="#ffd27a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f3154" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="1600" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="1516" rx="28" fill="#ffffff" stroke="#b4dcc2" stroke-width="4" filter="url(#shadow)"/>

  <rect x="90" y="90" width="1020" height="255" rx="18" fill="url(#hero)"/>
  <text x="130" y="150" font-size="42" font-family="Arial, sans-serif" font-weight="700" fill="#d8f4e3">TELANGANA EDUCATIONAL FOUNDATION</text>
  <text x="130" y="205" font-size="58" font-family="Arial, sans-serif" font-weight="800" fill="#ffffff">Merit Scholarship Program 2026</text>
  <rect x="130" y="235" width="520" height="72" rx="12" fill="url(#accent)"/>
  <text x="160" y="283" font-size="42" font-family="Arial, sans-serif" font-weight="800" fill="#173b5c">Up to Rs 4,50,000</text>

  <rect x="90" y="382" width="495" height="520" rx="18" fill="#eff8f2" stroke="#b8e2c6"/>
  <text x="128" y="445" font-size="42" font-family="Arial, sans-serif" font-weight="800" fill="#144d6e">Main Focus</text>
  <text x="128" y="510" font-size="56" font-family="Arial, sans-serif" font-weight="800" fill="#1f8f5d">1,000 Students</text>
  <text x="128" y="570" font-size="34" font-family="Arial, sans-serif" fill="#355c71">Scholarship intake for this cycle</text>
  <text x="128" y="650" font-size="36" font-family="Arial, sans-serif" font-weight="700" fill="#153f5e">Eligibility</text>
  <text x="128" y="700" font-size="30" font-family="Arial, sans-serif" fill="#325d74">Intermediate passing students</text>
  <text x="128" y="745" font-size="30" font-family="Arial, sans-serif" fill="#325d74">from deserving backgrounds</text>
  <text x="128" y="820" font-size="29" font-family="Arial, sans-serif" fill="#325d74">Transparent merit-based selection</text>

  <rect x="615" y="382" width="495" height="520" rx="18" fill="#f2f9ff" stroke="#c2dff5"/>
  <text x="650" y="445" font-size="42" font-family="Arial, sans-serif" font-weight="800" fill="#144d6e">Application Flow</text>
  <circle cx="668" cy="515" r="18" fill="#1f8f5d"/>
  <circle cx="668" cy="585" r="18" fill="#1f8f5d"/>
  <circle cx="668" cy="655" r="18" fill="#1f8f5d"/>
  <circle cx="668" cy="725" r="18" fill="#1f8f5d"/>
  <circle cx="668" cy="795" r="18" fill="#1f8f5d"/>
  <text x="661" y="523" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">1</text>
  <text x="661" y="593" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">2</text>
  <text x="661" y="663" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">3</text>
  <text x="661" y="733" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">4</text>
  <text x="661" y="803" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">5</text>
  <text x="708" y="523" font-size="31" font-family="Arial, sans-serif" fill="#214d67">Register Online</text>
  <text x="708" y="593" font-size="31" font-family="Arial, sans-serif" fill="#214d67">Fill Application Form</text>
  <text x="708" y="663" font-size="31" font-family="Arial, sans-serif" fill="#214d67">Take Scholarship Test</text>
  <text x="708" y="733" font-size="31" font-family="Arial, sans-serif" fill="#214d67">Submit Documents</text>
  <text x="708" y="803" font-size="31" font-family="Arial, sans-serif" fill="#214d67">Get Selection Result</text>

  <rect x="90" y="946" width="1020" height="266" rx="18" fill="#f2f9f2" stroke="#b6ddc3"/>
  <text x="130" y="1005" font-size="40" font-family="Arial, sans-serif" font-weight="800" fill="#144d6e">Scholarship Benefits</text>
  <text x="130" y="1062" font-size="31" font-family="Arial, sans-serif" fill="#2d5c45">- Tuition fee support</text>
  <text x="130" y="1110" font-size="31" font-family="Arial, sans-serif" fill="#2d5c45">- Books and study material assistance</text>
  <text x="130" y="1158" font-size="31" font-family="Arial, sans-serif" fill="#2d5c45">- Academic development support</text>

  <rect x="90" y="1250" width="1020" height="260" rx="18" fill="#0f4c86"/>
  <text x="130" y="1315" font-size="41" font-family="Arial, sans-serif" font-weight="800" fill="#ffffff">Contact TEF</text>
  <text x="130" y="1370" font-size="31" font-family="Arial, sans-serif" fill="#d9ecf8">www.telanganatef.org</text>
  <text x="130" y="1418" font-size="31" font-family="Arial, sans-serif" fill="#d9ecf8">info@telanganaeducationalfoundation.org</text>
  <text x="130" y="1465" font-size="31" font-family="Arial, sans-serif" fill="#d9ecf8">+91 XXXXX XXXXX</text>
</svg>
